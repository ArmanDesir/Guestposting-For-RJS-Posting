<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RightJob Syndication</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>RightJob Syndication</h1>
      <p id="summary">Loading newsroom status...</p>
    </div>
    <div class="actions">
      <button id="pullBtn" class="primary">Pull Latest</button>
      <button id="exportBtn">Regenerate Drafts</button>
      <button id="scheduleBtn">Run Schedule</button>
    </div>
  </header>

  <main>
    <section class="status-strip">
      <div>
        <span>DEV.to API</span>
        <strong id="devtoKey">Checking</strong>
      </div>
      <div>
        <span>Articles</span>
        <strong id="articleCount">0</strong>
      </div>
      <div>
        <span>Last Pull</span>
        <strong id="lastPull">-</strong>
      </div>
      <div>
        <span>Active Job</span>
        <strong id="activeJob">Idle</strong>
      </div>
    </section>

    <section class="split">
      <div class="panel">
        <div class="panel-head">
          <h2>Latest Articles</h2>
          <input id="search" type="search" placeholder="Search articles">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Article</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="articles"></tbody>
          </table>
        </div>
      </div>

      <aside class="panel side">
        <h2>Schedule Post</h2>
        <form id="scheduleForm" class="schedule-form">
          <label>
            Article
            <input id="scheduleSlug" name="slug" readonly placeholder="Select an article">
          </label>
          <label>
            Platform
            <select id="schedulePlatform" name="platform">
              <option value="devto">DEV.to</option>
              <option value="medium">Medium</option>
              <option value="hashnode">Hashnode</option>
              <option value="tumblr">Tumblr</option>
              <option value="forem">Forem</option>
              <option value="hubspot">HubSpot</option>
              <option value="substack">Substack</option>
              <option value="quora">Quora</option>
              <option value="hackernoon">HackerNoon</option>
              <option value="wakelet">Wakelet</option>
            </select>
          </label>
          <label>
            Action
            <select id="scheduleAction" name="action">
              <option value="manual">Manual schedule</option>
              <option value="draft">API draft</option>
              <option value="publish">API publish</option>
            </select>
          </label>
          <label>
            Date and time
            <input id="scheduleDate" name="date" type="datetime-local">
          </label>
          <button class="primary" type="submit">Add Schedule</button>
        </form>

        <h2 class="section-title">Posting Calendar</h2>
        <div id="calendar" class="calendar-list"></div>

        <h2 class="section-title">Run Log</h2>
        <pre id="log">No jobs yet.</pre>
      </aside>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
